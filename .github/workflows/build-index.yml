name: Build search index

# Regenerate search-index.json whenever the master index table changes on main.
# The bot commit only touches search-index.json (not README_EN.md), so the path
# filter below does not retrigger this workflow — no infinite loop.
on:
  push:
    branches: [main]
    paths:
      - "solutions/README_EN.md"
      - "build_index.py"
      - ".github/workflows/build-index.yml"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-index
  cancel-in-progress: true

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate search-index.json
        run: python build_index.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- search-index.json; then
            echo "search-index.json is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add search-index.json
          git commit -m "chore: rebuild search-index.json [skip ci]"
          git push

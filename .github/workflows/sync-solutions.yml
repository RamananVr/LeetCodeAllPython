name: Sync solutions

# Weekly (and on-demand) sync of Python/SQL solutions from doocs/leetcode.
# Runs fetch_solutions.py --overwrite, which mirrors solutions/ and rebuilds
# search-index.json, then commits any changes directly to main.
on:
  schedule:
    # Every Monday at 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-solutions
  cancel-in-progress: true

jobs:
  sync-solutions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch latest solutions
        run: python fetch_solutions.py --overwrite

      - name: Commit if changed
        run: |
          git add solutions search-index.json
          if git diff --cached --quiet; then
            echo "No solution changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync solutions from doocs/leetcode [skip ci]"
          git push
